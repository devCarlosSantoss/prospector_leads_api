services:
  leadfinder:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - data:/app/data
      - uploads:/app/backend/uploads
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  data:
  uploads:
