<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeadFinder - Prospecção B2B</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="navbar is-dark is-fixed-top" role="navigation" aria-label="main navigation">
    <div class="navbar-brand">
      <a class="navbar-item" href="/">
        <span class="icon-text">
          <span class="icon"><i class="fas fa-bullseye"></i></span>
          <span><strong>LeadFinder</strong></span>
        </span>
      </a>
      <a role="button" class="navbar-burger" data-target="navMenu">
        <span></span><span></span><span></span>
      </a>
    </div>
    <div id="navMenu" class="navbar-menu">
      <div class="navbar-start">
        <a class="navbar-item {% if active_page == 'search' %}is-active{% endif %}" href="/">
          <span class="icon"><i class="fas fa-search"></i></span>
          <span>Buscar Leads</span>
        </a>
        <a class="navbar-item {% if active_page == 'leads' %}is-active{% endif %}" href="/leads">
          <span class="icon"><i class="fas fa-list"></i></span>
          <span>Leads</span>
        </a>
        <a class="navbar-item {% if active_page == 'campaigns' %}is-active{% endif %}" href="/campaigns">
          <span class="icon"><i class="fas fa-folder"></i></span>
          <span>Campanhas</span>
        </a>
        <a class="navbar-item {% if active_page == 'dashboard' %}is-active{% endif %}" href="/dashboard">
          <span class="icon"><i class="fas fa-chart-bar"></i></span>
          <span>Dashboard</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="section" style="margin-top: 3.25rem;">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
